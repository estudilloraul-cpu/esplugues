<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#1a1410"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Piso Esplugues"/>
<link rel="manifest" href="manifest-inmo.json"/>
<title>Piso Esplugues</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --ink:#1a1410;--ink2:#3d3228;--ink3:#6b5d4f;--ink4:#a89880;
  --paper:#f8f4ee;--paper2:#f0e9de;--paper3:#e5d9c8;
  --gold:#c4912a;--gold2:#e8b84b;--gold3:#f5d98a;--gold4:#fdf4dc;
  --red:#a83232;--red2:#fdecea;--green:#2a6b3a;--green2:#d4edda;--white:#fffef9;
  --blue:#1a4a7a;--blue2:#ddeeff;
  --nav:64px;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);overflow:hidden;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit}
#app{display:flex;flex-direction:column;height:100dvh;padding-top:var(--st)}

/* HDR */
.hdr{background:var(--ink);color:var(--paper);padding:13px 18px 11px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--ink2)}
.hdr-title{font-family:'DM Sans',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:-.02em;line-height:1}
.hdr-sub{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--ink4);letter-spacing:.13em;text-transform:uppercase;margin-top:3px}
.hdr-count{font-size:.62rem;color:var(--ink4);font-family:'DM Mono',monospace;margin-top:2px}
.hdr-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:var(--paper);border-radius:6px;padding:6px 11px;font-size:.74rem;font-weight:500;transition:background .15s}
.hdr-btn:active{background:rgba(255,255,255,.2)}
.hdr-btn.gold{background:var(--gold);border-color:var(--gold2);color:var(--ink)}

/* NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--sb));background:var(--ink);border-top:1px solid var(--ink2);display:flex;padding-bottom:var(--sb);z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--ink3);font-size:.62rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;padding-top:5px;transition:color .15s}
.nb.on{color:var(--gold2)}
.ni{font-size:1.28rem;line-height:1}

/* PAGES */
.pages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav) + var(--sb) + 8px)}
.page{display:none}.page.on{display:block}

/* EMPTY */
.list-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55dvh;gap:12px;color:var(--ink4)}
.list-empty .big{font-size:3rem}
.list-empty p{font-size:.82rem;text-align:center;line-height:1.5;max-width:240px}

/* CARD LISTA */
.agency-card{margin:12px 13px 0;border-radius:14px;background:var(--white);border:1px solid var(--paper3);overflow:hidden;cursor:pointer;box-shadow:0 2px 10px rgba(26,20,16,.05);transition:transform .13s}
.agency-card:active{transform:scale(.99)}
.ac-top{padding:14px 15px 10px;border-bottom:1px solid var(--paper2);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.ac-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--ink);line-height:1.1}
.ac-agent{font-size:.7rem;color:var(--gold);font-weight:600;margin-top:2px}
.ac-date{font-size:.62rem;color:var(--ink4);font-family:'DM Mono',monospace;margin-top:1px}
.excl-badge{font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:4px;margin-top:5px;display:inline-block}
.excl-si{background:var(--red2);color:var(--red)}.excl-neg{background:var(--gold4);color:var(--gold)}.excl-no{background:var(--green2);color:var(--green)}
.ac-stars{font-size:.95rem;letter-spacing:-1px;color:var(--gold2)}
.ac-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--paper2)}
.ac-cell{padding:9px 13px;border-right:1px solid var(--paper2)}.ac-cell:last-child{border-right:none}
.ac-cell-lbl{font-size:.55rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-bottom:2px;font-family:'DM Mono',monospace}
.ac-cell-val{font-size:.88rem;font-weight:600;color:var(--ink)}
.ac-cell-val.hl{color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:1rem}
.ac-cell-val.gr{color:var(--green)}.ac-cell-val.rd{color:var(--red)}
.ac-bottom{padding:9px 14px 11px;display:flex;align-items:center;justify-content:space-between;gap:7px;flex-wrap:wrap}
.ac-mkt{display:flex;flex-wrap:wrap;gap:3px}
.mkt-tag{font-size:.59rem;font-weight:500;background:var(--paper2);color:var(--ink3);padding:2px 6px;border-radius:4px}
.ac-net{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink3)}
.ac-net b{color:var(--green);font-weight:600}
.ac-export-btn{font-size:.66rem;font-weight:500;color:var(--ink4);background:var(--paper2);border:1px solid var(--paper3);border-radius:5px;padding:4px 8px;cursor:pointer}
.ac-export-btn:active{background:var(--paper3)}

/* COMPARE */
.compare-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50dvh;gap:10px;color:var(--ink4);font-size:.82rem;text-align:center;padding:20px}
.compare-scroll{overflow-x:auto;padding:12px 13px 0;-webkit-overflow-scrolling:touch}
.compare-table{border-collapse:collapse;min-width:100%;white-space:nowrap}
.ct-head th{font-family:'DM Mono',monospace;font-size:.57rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--ink4);padding:10px 12px;text-align:left;border-bottom:1.5px solid var(--paper3);background:var(--paper);position:sticky;top:0}
.ct-head th:first-child{position:sticky;left:0;z-index:2;background:var(--paper)}
.compare-table td{padding:10px 12px;border-bottom:1px solid var(--paper2);font-size:.78rem;color:var(--ink);vertical-align:top}
.compare-table td:first-child{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:600;position:sticky;left:0;background:var(--white);z-index:1;border-right:1.5px solid var(--paper3);min-width:110px}
.compare-table tr:nth-child(even) td{background:var(--paper)}
.compare-table tr:nth-child(even) td:first-child{background:var(--paper)}
.best{color:var(--green);font-weight:700}.worst{color:var(--red)}
.compare-legend{margin:10px 13px;font-size:.66rem;color:var(--ink4);display:flex;gap:14px;flex-wrap:wrap}

/* DETAIL */
.detail-hero{background:var(--ink);color:var(--paper);padding:17px 17px 13px}
.d-inp-name{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:600;background:transparent;border:none;color:var(--paper);outline:none;width:100%;line-height:1.05;border-bottom:1px dashed rgba(255,255,255,.18);padding-bottom:3px}
.d-inp-name::placeholder{color:rgba(255,255,255,.25)}
.d-inp-meta{font-family:'DM Sans',sans-serif;font-size:.8rem;background:transparent;border:none;color:rgba(232,184,75,.9);outline:none;width:100%;margin-top:4px;font-weight:500}
.d-inp-meta::placeholder{color:rgba(168,152,128,.4)}
.d-inp-date{font-family:'DM Mono',monospace;font-size:.62rem;background:transparent;border:none;color:var(--ink4);outline:none;margin-top:3px;width:160px}
.d-stars-row{margin-top:8px;display:flex;gap:4px}
.dstar{font-size:1.3rem;cursor:pointer;color:rgba(255,255,255,.15);transition:color .1s;line-height:1}
.dstar.on{color:var(--gold2)}

/* DETAIL GRID */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--paper3);border-top:1px solid var(--paper3)}
.dc{background:var(--white);padding:12px 14px}.dc.wide{grid-column:1/-1}.dc.full{grid-column:1/-1}
.dc-lbl{font-family:'DM Mono',monospace;font-size:.55rem;font-weight:500;letter-spacing:.11em;text-transform:uppercase;color:var(--ink4);margin-bottom:5px}
.dc-inp{width:100%;border:none;background:transparent;font-size:.86rem;font-weight:600;color:var(--ink);outline:none;border-bottom:1px dashed var(--paper3);padding-bottom:2px;transition:border-color .15s}
.dc-inp:focus{border-color:var(--gold)}
.dc-inp.big{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--gold)}
.dc-inp.light{font-weight:400;font-size:.83rem}
textarea.dc-inp{resize:none;font-weight:400;font-size:.82rem;line-height:1.55;border-bottom:none;border:1px dashed var(--paper3);border-radius:6px;padding:6px 8px;margin-top:2px;min-height:70px}
textarea.dc-inp:focus{border-color:var(--gold)}
.neto-display{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:600;color:var(--green);margin-top:2px}

/* TOGGLES inline */
.dc-toggle{display:flex;gap:5px;margin-top:4px}
.dc-tog{flex:1;padding:7px 4px;border-radius:6px;border:1.5px solid var(--paper3);background:var(--paper);color:var(--ink3);font-size:.72rem;font-weight:500;text-align:center;cursor:pointer;transition:all .12s}
.dc-tog.sel{background:var(--ink);border-color:var(--ink);color:var(--paper)}

/* MKT chips inline */
.dc-mkt{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.dc-mchip{padding:5px 9px;border-radius:5px;border:1.5px solid var(--paper3);background:var(--paper);color:var(--ink3);font-size:.71rem;font-weight:500;cursor:pointer;transition:all .12s}
.dc-mchip.sel{background:var(--gold4);border-color:var(--gold);color:var(--ink)}

/* Section headers inside detail */
.dc-section{grid-column:1/-1;background:var(--paper);padding:9px 14px 7px;border-top:1px solid var(--paper3)}
.dc-section-title{font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)}

/* Opinion piso chips */
.opinion-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.op-chip{padding:5px 9px;border-radius:5px;border:1.5px solid var(--paper3);background:var(--paper);color:var(--ink3);font-size:.71rem;font-weight:500;cursor:pointer;transition:all .12s}
.op-chip.sel{background:var(--blue2);border-color:#90b8e0;color:var(--blue)}

/* Save indicator */
.save-indicator{font-size:.67rem;color:var(--green);font-family:'DM Mono',monospace;text-align:center;padding:5px 0;opacity:0;transition:opacity .3s}
.save-indicator.show{opacity:1}

/* DETAIL ACTIONS */
.detail-actions{display:flex;gap:6px;padding:12px 13px 0;flex-wrap:wrap}
.detail-actions button{flex:1;min-width:70px}

/* FORM */
.form-wrap{padding:13px 13px 0}
.form-section{margin-bottom:15px}
.form-section-title{font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--paper3)}
.field{margin-bottom:10px}
.lbl{font-size:.7rem;font-weight:600;color:var(--ink2);letter-spacing:.02em;margin-bottom:4px;display:block}
.inp{width:100%;border:1.5px solid var(--paper3);border-radius:7px;padding:10px 11px;font-size:.85rem;color:var(--ink);background:var(--white);outline:none;transition:border .15s;-webkit-appearance:none}
.inp:focus{border-color:var(--gold)}
textarea.inp{resize:none;min-height:66px}
.inp-row{display:flex;gap:7px}.inp-row .field{flex:1}
.stars-input{display:flex;gap:4px;margin-top:2px}
.star-btn{font-size:1.5rem;color:var(--paper3);cursor:pointer;transition:color .1s;line-height:1}
.star-btn.on{color:var(--gold2)}
.toggle-row{display:flex;gap:5px}
.tog{flex:1;padding:8px 5px;border-radius:7px;border:1.5px solid var(--paper3);background:var(--paper);color:var(--ink3);font-size:.77rem;font-weight:500;text-align:center;cursor:pointer;transition:all .12s}
.tog.sel{background:var(--ink);border-color:var(--ink);color:var(--paper)}
.mkt-checks{display:flex;flex-wrap:wrap;gap:5px;margin-top:3px}
.mkt-check{padding:6px 10px;border-radius:5px;border:1.5px solid var(--paper3);background:var(--paper);color:var(--ink3);font-size:.73rem;font-weight:500;cursor:pointer;transition:all .12s}
.mkt-check.sel{background:var(--gold4);border-color:var(--gold);color:var(--ink)}
.calc-preview{background:var(--ink);color:var(--paper);border-radius:9px;padding:12px 14px;margin-top:7px;display:none}
.calc-preview.show{display:block}
.calc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.calc-row:last-child{margin-bottom:0;padding-top:6px;border-top:1px solid rgba(255,255,255,.1)}
.calc-lbl{font-size:.7rem;color:var(--ink4)}
.calc-val{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600}
.calc-val.green{color:#6be08a}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:12px 15px;border-radius:7px;font-size:.83rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit}
.btn-ink{background:var(--ink);color:var(--paper);width:100%;margin-top:5px}
.btn-ink:active{background:var(--ink2);transform:scale(.99)}
.btn-outline{border:1.5px solid var(--paper3);color:var(--ink2);background:transparent}
.btn-outline:active{background:var(--paper2)}
.btn-danger{background:var(--red2);color:var(--red);border:1.5px solid #f0c0c0}
.btn-save{background:var(--green);color:var(--white)}
.btn-save:active{background:#1e5029}
.btn-export{background:var(--gold4);color:var(--gold);border:1.5px solid var(--gold3)}

/* MODAL */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:200;display:none;align-items:flex-end}
.backdrop.open{display:flex}
.sheet{background:var(--paper);border-radius:18px 18px 0 0;width:100%;padding:18px 17px;padding-bottom:calc(18px + var(--sb));transform:translateY(100%);transition:transform .33s cubic-bezier(.32,1,.23,1);max-height:90dvh;overflow-y:auto}
.backdrop.open .sheet{transform:translateY(0)}
.handle{width:36px;height:4px;background:var(--paper3);border-radius:99px;margin:0 auto 14px}
.stitle{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--ink);margin-bottom:12px}
.confirm-row{display:flex;gap:8px;margin-top:4px}
.confirm-row button{flex:1}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav) + var(--sb) + 10px);left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:var(--paper);padding:9px 19px;border-radius:99px;font-size:.78rem;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.28);z-index:999;opacity:0;transition:all .24s ease;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
<header class="hdr">
  <div>
    <div class="hdr-title">Piso Esplugues</div>
    <div class="hdr-sub">Comparador inmobiliarias</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
    <button class="hdr-btn gold" onclick="showPage('form');resetForm()">+ Añadir</button>
    <div class="hdr-count" id="hdr-count"></div>
  </div>
</header>

<div class="pages">
  <div class="page on" id="page-lista"><div id="lista-content"></div></div>
  <div class="page" id="page-comparar"><div id="compare-content"></div></div>
  <div class="page" id="page-form"><div class="form-wrap" id="form-inner"></div></div>
  <div class="page" id="page-detail"><div id="detail-inner"></div></div>
</div>

<nav class="bnav">
  <button class="nb on" id="nb-lista" onclick="showPage('lista')"><span class="ni">🏢</span>Fichas</button>
  <button class="nb" id="nb-comparar" onclick="showPage('comparar')"><span class="ni">⚖️</span>Comparar</button>
</nav>
</div>
<div id="toast"></div>

<div class="backdrop" id="m-del">
  <div class="sheet">
    <div class="handle"></div>
    <div class="stitle">¿Eliminar ficha?</div>
    <p style="font-size:.83rem;color:var(--ink3);margin-bottom:13px;line-height:1.5" id="del-msg"></p>
    <div class="confirm-row">
      <button class="btn btn-outline" onclick="closeM('m-del')">Cancelar</button>
      <button class="btn btn-danger" onclick="doDelete()">Eliminar</button>
    </div>
  </div>
</div>

<script>
/* ══ CONSTANTS ══ */
const MKT_OPTIONS = [
  {k:'Fotos profesionales',e:'📷'},{k:'Fotógrafo profesional',e:'📸'},
  {k:'Vídeo/tour virtual',e:'🎥'},{k:'Idealista',e:'🏠'},
  {k:'Fotocasa',e:'🏠'},{k:'Habitaclia',e:'🏠'},
  {k:'Redes sociales',e:'📱'},{k:'Home staging',e:'🛋️'},
  {k:'Plano del piso',e:'📐'},{k:'Todas las plataformas',e:'🌐'},
];
const OPINION_OPTIONS = [
  'Buena luz','Buena ventilación','Para entrar a vivir','Baño reformado',
  'Estancias amplias','Posibilidad baño extra','Cocina amplia','Terraza/balcón',
  'Buen estado general','Potencial de mejora','Zona tranquila','Buenas comunicaciones',
];

/* ══ DATA ══ */
let DB = {agencies:[]};
let deleteId = null;
let detailId = null, detailMkt=[], detailExcl='no', detailStars=0, detailOpinion=[];
let formStars=0, formExcl='no', formMkt=['Fotos profesionales','Idealista','Fotocasa'];

/* Demo data: Don Piso */
const DEMO_AGENCIES = [
  {
    id:'donpiso',
    name:'Don Piso',
    agent:'José Ángel',
    date:new Date().toISOString().split('T')[0],
    stars:5,
    price:307500,
    priceMin:300000,
    priceMax:315000,
    commission:3,
    commissionNote:'3% + IVA, negociable. Dispuesto a ajustarse si hace falta.',
    exclusivity:'no',
    exclusivityNote:'No pide exclusividad. Prefiere sin ella porque genera tensiones. Sí pide documento de autorización de visitas y entrega de llaves (por protección y control).',
    time:'A determinar',
    similar:null,
    marketing:['Fotógrafo profesional','Todas las plataformas','Idealista','Fotocasa'],
    certEnergetico:'170€ con su técnico (solo si no vende él el piso)',
    cedula:'Incluida en los 170€',
    parking:'No incluir de entrada. Solo mencionar si el comprador pregunta.',
    comunidad:'Pendiente: pedir cuota al administrador. Pedir ITE de la finca (debe existir por reforma fachada). Confirmar derramas.',
    opinion:['Buena luz','Buena ventilación','Para entrar a vivir','Baño reformado','Estancias amplias','Potencial de mejora'],
    opinionNotes:'Ha hecho medición completa con láser. Venta cercana de referencia: salida 310k, cierre 285k. Menciona posibilidad de añadir aseo/baño extra.',
    visitas:'Avisa con antelación. Se desactiva alarma antes de la visita y se reactiva después.',
    nextStep:'Quedar un día para entregarle la llave. Antes, enviarle por mail el documento/autorización.',
    sensacion:'Muy buena opción. Honesto, con experiencia, transmite confianza. Lleva muchos años vendiendo pisos. Potente estructura y buen alcance. Muy buena sensación, junto con Xavi es la mejor opción.',
    notes:'',
  },
  {
    id:'juma',
    name:'Fincas Juma',
    agent:'',
    date:new Date().toISOString().split('T')[0],
    stars:0,
    price:null,priceMin:null,priceMax:null,
    commission:null,commissionNote:'',
    exclusivity:'si',
    exclusivityNote:'Piden exclusividad.',
    time:'',similar:null,
    marketing:['Idealista','Fotocasa','Habitaclia','Redes sociales'],
    certEnergetico:'',cedula:'',parking:'',comunidad:'',
    opinion:[],opinionNotes:'',visitas:'',nextStep:'',
    sensacion:'Campaña en plataformas tipo Idealista y similares.',
    notes:'',
  }
];

function load(){
  try{
    const r=localStorage.getItem('inmo26');
    if(r){DB={...DB,...JSON.parse(r)};return;}
  }catch(e){}
  DB.agencies=[...DEMO_AGENCIES];
  save();
}
function save(){localStorage.setItem('inmo26',JSON.stringify(DB))}

/* ══ FORMAT ══ */
const fmtEur=n=>n?new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n):'–';
const fmtDate=iso=>iso?new Date(iso+'T12:00').toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}):'';
const starsStr=n=>'★'.repeat(n||0)+'☆'.repeat(5-(n||0));
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* ══ LISTA ══ */

/* ══ COMPARE ══ */
function renderCompare(){
  const el=document.getElementById('compare-content');
  if(!DB.agencies.length){el.innerHTML=`<div class="compare-empty"><div style="font-size:2.5rem">⚖️</div><p>Añade inmobiliarias para comparar</p></div>`;return;}
  const prices=DB.agencies.map(a=>a.price).filter(Boolean);
  const comms=DB.agencies.map(a=>a.commission).filter(Boolean);
  const nets=DB.agencies.map(a=>a.price&&a.commission?a.price-a.price*a.commission/100:null).filter(Boolean);
  const maxPrice=prices.length?Math.max(...prices):null;
  const minComm=comms.length?Math.min(...comms):null;
  const maxNet=nets.length?Math.max(...nets):null;
  const maxStars=DB.agencies.length?Math.max(...DB.agencies.map(a=>a.stars||0)):0;
  const rows=DB.agencies.map(a=>{
    const net=a.price&&a.commission?a.price-a.price*a.commission/100:null;
    const rango=a.priceMin&&a.priceMax?`${fmtEur(a.priceMin)}–${fmtEur(a.priceMax)}`:(a.price?fmtEur(a.price):'–');
    return `<tr>
      <td>${esc(a.name)}${a.agent?`<br><span style="font-size:.65rem;color:var(--gold)">${esc(a.agent)}</span>`:''}
      </td>
      <td class="${a.price===maxPrice?'best':''}">${rango}</td>
      <td class="${a.commission===minComm?'best':a.commission>(minComm||0)*1.5?'worst':''}">${a.commission?a.commission+'%':'–'}</td>
      <td class="${net===maxNet?'best':''}">${net?fmtEur(net):'–'}</td>
      <td>${a.exclusivity==='si'?'⚠ Sí':a.exclusivity==='negociable'?'↕ Neg.':'✓ No'}</td>
      <td>${a.certEnergetico||'–'}</td>
      <td class="${(a.stars||0)===maxStars&&maxStars>0?'best':''}">${'★'.repeat(a.stars||0)||'–'}</td>
    </tr>`;
  }).join('');
  el.innerHTML=`<div class="compare-scroll"><table class="compare-table">
    <thead class="ct-head"><tr><th>Inmobiliaria</th><th>Precio salida</th><th>Comisión</th><th>Neto</th><th>Exclusiva</th><th>Cert. energético</th><th>Confianza</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>
  <div class="compare-legend"><span><b style="color:var(--green)">Verde</b> = mejor</span><span><span style="color:var(--red)">Rojo</span> = desfavorable</span></div>`;
}

function setDS(n){detailStars=n;document.querySelectorAll('#d-stars .dstar').forEach((s,i)=>s.classList.toggle('on',i<n))}
function setDE(el){document.querySelectorAll('.dc-tog[data-excl]').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');detailExcl=el.dataset.excl}
function togDetailMkt(el){el.classList.toggle('sel');const k=el.dataset.mkt;if(el.classList.contains('sel')){if(!detailMkt.includes(k))detailMkt.push(k)}else{detailMkt=detailMkt.filter(m=>m!==k)}}
function togDetailOp(el){el.classList.toggle('sel');const k=el.dataset.op;if(el.classList.contains('sel')){if(!detailOpinion.includes(k))detailOpinion.push(k)}else{detailOpinion=detailOpinion.filter(o=>o!==k)}}
function updNeto(){const p=parseFloat(document.getElementById('d-price')?.value);const c=parseFloat(document.getElementById('d-comm')?.value);const el=document.getElementById('d-neto');if(el)el.textContent=(p&&c)?fmtEur(p-p*c/100):'–'}

function saveDetail(){
  const a=DB.agencies.find(x=>x.id===detailId);
  if(!a)return;
  const g=id=>document.getElementById(id)?.value.trim()||'';
  const gn=id=>parseFloat(document.getElementById(id)?.value)||null;
  a.name=g('d-name')||a.name; a.agent=g('d-agent'); a.date=g('d-date');
  a.stars=detailStars; a.price=gn('d-price'); a.commission=gn('d-comm');
  a.priceMin=gn('d-priceMin'); a.priceMax=gn('d-priceMax');
  a.commissionNote=g('d-commNote'); a.exclusivity=detailExcl;
  a.exclusivityNote=g('d-exclNote'); a.time=g('d-time');
  a.similar=parseInt(document.getElementById('d-similar')?.value)||null;
  a.certEnergetico=g('d-cert'); a.cedula=g('d-cedula');
  a.parking=g('d-parking'); a.comunidad=g('d-comunidad');
  a.marketing=[...detailMkt]; a.visitas=g('d-visitas');
  a.opinion=[...detailOpinion]; a.opinionNotes=g('d-opinionNotes');
  a.nextStep=g('d-nextStep'); a.sensacion=g('d-sensacion'); a.notes=g('d-notes');
  save(); renderLista(); renderCompare();
  const ind=document.getElementById('d-save-ind');
  if(ind){ind.classList.add('show');setTimeout(()=>ind.classList.remove('show'),2200)}
  showToast(`${a.name} guardada ✓`);
}

/* ══ EXPORT TXT ══ */
function exportTxt(id){
  const a=DB.agencies.find(x=>x.id===id);
  if(!a)return;
  const net=a.price&&a.commission?a.price-a.price*a.commission/100:null;
  const exclMap={si:'Sí, exigen exclusiva',negociable:'Negociable',no:'No exigen exclusiva'};
  const rango=a.priceMin&&a.priceMax?`${fmtEur(a.priceMin)} – ${fmtEur(a.priceMax)}`:(a.price?fmtEur(a.price):'–');
  const sep='─'.repeat(40);
  const lines=[
    '══════════════════════════════════════════',
    '  PISO ESPLUGUES — Ficha de inmobiliaria',
    '══════════════════════════════════════════',
    '',
    `Inmobiliaria:      ${a.name}`,
    `Agente:            ${a.agent||'–'}`,
    `Fecha visita:      ${fmtDate(a.date)||'–'}`,
    `Confianza:         ${'★'.repeat(a.stars||0)||'Sin valorar'}`,
    '',sep,
    'ECONÓMICO',sep,
    `Precio de salida:  ${rango}`,
    `Comisión:          ${a.commission?a.commission+'% + IVA':'–'}`,
    `Neto estimado:     ${net?fmtEur(net):'–'}`,
    ...(a.commissionNote?[`Nota comisión:     ${a.commissionNote}`]:[]),
    '',sep,
    'CONDICIONES',sep,
    `Exclusividad:      ${exclMap[a.exclusivity]||'–'}`,
    ...(a.exclusivityNote?[`Detalle:           ${a.exclusivityNote}`]:[]),
    `Plazo estimado:    ${a.time||'–'}`,
    `Pisos en cartera:  ${a.similar?a.similar+' pisos similares':'–'}`,
    `Cert. energético:  ${a.certEnergetico||'–'}`,
    `Cédula habitab.:   ${a.cedula||'–'}`,
    `Parking:           ${a.parking||'–'}`,
    ...(a.comunidad?[``,`Comunidad/docs pendientes:`,a.comunidad]:[]),
    '',sep,
    'MARKETING Y VISITAS',sep,
    `Incluye:           ${(a.marketing||[]).join(', ')||'–'}`,
    ...(a.visitas?[`Visitas:           ${a.visitas}`]:[]),
    '',sep,
    'OPINIÓN DEL PISO',sep,
    ...(a.opinion&&a.opinion.length?[`Destacan:          ${a.opinion.join(', ')}`]:[]),
    ...(a.opinionNotes?[`Observaciones:`,a.opinionNotes]:[]),
    '',sep,
    'SIGUIENTE PASO Y VALORACIÓN',sep,
    ...(a.nextStep?[`Próximo paso:`,a.nextStep,'']:[]),
    ...(a.sensacion?[`Sensación general:`,a.sensacion,'']:[]),
    ...(a.notes?[`Notas adicionales:`,a.notes,'']:[]),
    '══════════════════════════════════════════',
    `Exportado: ${new Date().toLocaleString('es-ES')}`,
  ];
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;link.download=`${a.name.replace(/\s+/g,'-')}.txt`;
  document.body.appendChild(link);link.click();document.body.removeChild(link);
  URL.revokeObjectURL(url);
  showToast(`Exportado: ${a.name}.txt`);
}

function updateCalc(){
  const p=parseFloat(document.getElementById('f-price')?.value);
  const c=parseFloat(document.getElementById('f-commission')?.value);
  const pr=document.getElementById('calc-preview');if(!pr)return;
  if(p&&c){document.getElementById('calc-price').textContent=fmtEur(p);document.getElementById('calc-comm').textContent=fmtEur(p*c/100);document.getElementById('calc-net').textContent=fmtEur(p-p*c/100);pr.classList.add('show')}
  else{pr.classList.remove('show')}
}
function setStar(n){formStars=n;document.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('on',+b.dataset.s<=n))}
function selToggle(g,el){document.querySelectorAll(`.tog[data-${g}]`).forEach(b=>b.classList.remove('sel'));el.classList.add('sel');if(g==='excl')formExcl=el.dataset.excl}
function togMkt(el){el.classList.toggle('sel');const k=el.dataset.mkt;if(el.classList.contains('sel')){if(!formMkt.includes(k))formMkt.push(k)}else{formMkt=formMkt.filter(m=>m!==k)}}

function saveAgency(){
  const name=document.getElementById('f-name')?.value.trim();
  if(!name){showToast('Escribe el nombre de la inmobiliaria');return;}
  const agency={
    id:Date.now().toString(),name,
    date:document.getElementById('f-date')?.value||new Date().toISOString().split('T')[0],
    agent:document.getElementById('f-agent')?.value.trim()||'',
    price:parseFloat(document.getElementById('f-price')?.value)||null,
    priceMin:null,priceMax:null,
    commission:parseFloat(document.getElementById('f-commission')?.value)||null,
    commissionNote:'',exclusivity:formExcl,exclusivityNote:'',
    time:document.getElementById('f-time')?.value.trim()||'',similar:null,
    marketing:[...formMkt],certEnergetico:'',cedula:'',parking:'',comunidad:'',
    stars:formStars,opinion:[],opinionNotes:'',visitas:'',nextStep:'',
    sensacion:document.getElementById('f-notes')?.value.trim()||'',notes:'',
  };
  DB.agencies.push(agency);save();renderLista();renderCompare();
  showPage('lista');showToast(`${name} añadida ✓`);
}

/* ══ DELETE ══ */
function confirmDelete(id,name){deleteId=id;document.getElementById('del-msg').textContent=`¿Eliminar la ficha de "${name}"? No se puede deshacer.`;openM('m-del')}
function doDelete(){DB.agencies=DB.agencies.filter(a=>a.id!==deleteId);save();closeM('m-del');showPage('lista');renderLista();renderCompare();showToast('Ficha eliminada')}

/* ══ NAV ══ */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const p=document.getElementById('page-'+id);if(p)p.classList.add('on');
  const n=document.getElementById('nb-'+id);if(n)n.classList.add('on');
  if(id==='lista')renderLista();
  if(id==='comparar')renderCompare();
}

/* ══ MODAL / TOAST ══ */
function openM(id){const m=document.getElementById(id);m.classList.add('open');const c=e=>{if(e.target===m){closeM(id);m.removeEventListener('click',c)}};m.addEventListener('click',c)}
function closeM(id){document.getElementById(id).classList.remove('open')}
let tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2500)}

/* ══ INIT ══ */
function init(){
  load();renderLista();renderCompare();resetForm();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('sw-inmo.js').catch(()=>{});
}
init();
</script>
</body>
